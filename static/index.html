<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Virtual-Azurion</title>
  <link rel="icon" type="image/x-icon" href="https://www.philips.co.uk/c-etc/philips/clientlibs/foundation-base/clientlibs-css/img/favicon/favicon-16x16.png" />
  <link media="all" rel="stylesheet" href="custom-style.css" />
    <!-- Promise polyfill for IE11 -->
    <script src="vendor/promise.js"></script>
    <!-- ES2015/ES6 modules polyfill -->
    <script nomodule src="vendor/browser-es-module-loader/dist/browser-es-module-loader.js"></script>
    <script type="module" crossorigin="anonymous">
      const apiPrefix = 'k8s/apis';
      const namespace = 'virtual-azurion';
      const ACTION_REFRESH_MS = 1000;
      const VM_LIST_REFRESH_MS = 60000;

      let actionRefreshTimerId = null;
      let vmListRefreshTimerId = null;
      let pendingActionVmNames = new Set();
      let pendingActionMeta = new Map();
      let vmRowStateMap = new Map();
      let loadInProgress = false;
      let loadQueued = false;
      let refreshInProgress = false;
      let refreshQueued = false;

      function stateSignature(state) {
        return String(state.phase) + '|' + String(state.readyStatus) + '|' + String(state.fetchError);
      }

      function shouldDisableVncButton(vmName, phase, controlState) {
        return phase !== 'Running' || controlState.isBlocked;
      }

      function startActionRefreshLoop() {
        if (actionRefreshTimerId !== null) {
          return;
        }

        actionRefreshTimerId = window.setInterval(() => {
          if (pendingActionVmNames.size === 0) {
            stopActionRefreshLoop();
            return;
          }
          refreshPendingVmStates();
        }, ACTION_REFRESH_MS);
      }

      function stopActionRefreshLoop() {
        if (actionRefreshTimerId !== null) {
          window.clearInterval(actionRefreshTimerId);
          actionRefreshTimerId = null;
        }
      }

      function startVmListRefreshLoop() {
        if (vmListRefreshTimerId !== null) {
          return;
        }

        vmListRefreshTimerId = window.setInterval(() => {
          loadVms();
        }, VM_LIST_REFRESH_MS);
      }

      function trackVmAction(vmName) {
        const rowState = vmRowStateMap.get(vmName);
        const baselineSignature = rowState ? stateSignature(rowState.currentState) : null;
        pendingActionVmNames.add(vmName);
        pendingActionMeta.set(vmName, { baselineSignature: baselineSignature, sawChange: false });
        startActionRefreshLoop();
        refreshPendingVmStates();
      }

      function clearRows() {
        document.getElementById('vmis').replaceChildren();
        vmRowStateMap.clear();
        pendingActionMeta.clear();
      }

      function addMessageRow(message) {
        const tr = document.createElement('tr');
        tr.className = 'table-message';
        const th = document.createElement('th');
        th.colSpan = 6;
        th.textContent = message;
        tr.appendChild(th);
        document.getElementById('vmis').appendChild(tr);
      }

      async function getCurrentUsername() {
        const url = '/' + apiPrefix + '/authentication.k8s.io/v1/selfsubjectreviews';
        const body = {
          apiVersion: 'authentication.k8s.io/v1',
          kind: 'SelfSubjectReview'
        };

        try {
          const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          if (!resp.ok) {
            return 'unknown';
          }

          const review = await resp.json();
          const username = review.status?.userInfo?.username;
          return username ? String(username) : 'unknown';
        } catch (err) {
          return 'unknown';
        }
      }

      function calculateAge(creationTimestamp) {
        if (!creationTimestamp) return 'Unknown';
        const created = new Date(creationTimestamp);
        const now = new Date();
        const diffMs = now - created;
        const diffMins = Math.floor(diffMs / (1000 * 60));
        const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

        if (diffMins < 1) return 'now';
        if (diffMins < 60) return diffMins + 'm';
        if (diffHours < 24) return diffHours + 'h';
        return diffDays + 'd';
      }

      function getReadyStatus(vmi) {
        if (!vmi.status?.conditions) return 'Unknown';
        const readyCondition = vmi.status.conditions.find((c) => c.type === 'Ready');
        if (!readyCondition) return 'Unknown';
        return readyCondition.status === 'True' ? 'Ready' : 'Not Ready';
      }

      function buildVmDisplayState(vmi, fetchError) {
        const phase = fetchError ? 'Error' : (vmi ? String(vmi.status?.phase || 'Stopped') : 'Stopped');
        const readyStatus = fetchError ? 'Error' : (vmi ? getReadyStatus(vmi) : 'Not Ready');
        const controlState = getControlState(phase, readyStatus, fetchError);
        return {
          phase: phase,
          readyStatus: readyStatus,
          fetchError: fetchError,
          controlState: controlState
        };
      }

      async function sendStartStop(vmName, action) {
        const vmPath = apiPrefix + '/subresources.kubevirt.io/v1alpha3/namespaces/' +
          namespace + '/virtualmachines/' + encodeURIComponent(vmName) + '/' + action;

        try {
          const resp = await fetch('/' + vmPath, { method: 'PUT' });
          if (!resp.ok) {
            console.error('Failed to ' + action + ' VM: ' + resp.status);
          }
        } catch (err) {
          console.error('Error sending ' + action + ':', err);
        } finally {
          await new Promise((resolve) => setTimeout(resolve, 500));
          refreshPendingVmStates();
        }
      }

      function getControlState(phase, readyStatus, fetchError) {
        const canStart = !fetchError && (phase === 'Stopped' || phase === 'Failed') && readyStatus === 'Not Ready';
        const canStop = !fetchError && phase === 'Running' && readyStatus === 'Ready';
        const isBlocked = !(canStart || canStop);
        return {
          action: phase === 'Running' ? 'stop' : 'start',
          isBlocked: isBlocked
        };
      }

      function createControlButton(vmName, phase, readyStatus, fetchError) {
        const btn = document.createElement('button');
        btn.setAttribute('role', 'button');
        btn.className = 'button-control';
        
        const controlState = getControlState(phase, readyStatus, fetchError);
        const action = controlState.action;
        const isBlocked = controlState.isBlocked;

        btn.textContent = isBlocked ? (action === 'stop' ? 'Stop (Blocked)' : 'Start (Blocked)') : (action === 'stop' ? 'Stop' : 'Start');
        btn.setAttribute('data-action', action);
        btn.classList.add(action === 'start' ? 'button-control-start' : 'button-control-stop');
        btn.disabled = isBlocked;
        if (isBlocked) {
          btn.title = 'Action blocked until VM state is stable and VM info is available';
        }
        
        btn.addEventListener('click', () => {
          btn.disabled = true;
          const action = btn.getAttribute('data-action');
          trackVmAction(vmName);
          sendStartStop(vmName, action);
        });

        return btn;
      }

      async function deleteVm(vmName) {
        const vmPath = apiPrefix + '/kubevirt.io/v1/namespaces/' +
          namespace + '/virtualmachines/' + encodeURIComponent(vmName);

        try {
          // Close the GitHub issue if this is a va-issue VM
          const issueMatch = vmName.match(/^va-issue(\d+)$/);
          if (issueMatch) {
            const issueNumber = issueMatch[1];
            await closeGithubIssue(issueNumber);
          }
        } catch (err) {
          console.error('Error deleting VM:', err);
          alert('Error deleting virtual azurion: ' + err.message);
          return false;
        }
      }

      async function closeGithubIssue(issueNumber) {
        try {
          // Use GitHub token that the user has already provided to the browser app
          let token = sessionStorage.getItem('github_token') || localStorage.getItem('github_token');

          if (!token) {
            console.warn('No GitHub token available to close issue');
            return;
          }

          const owner = 'philips-internal';
          const repository = 'igts-aicompanion-platform-engineering';

          const commentResp = await fetch('https://api.github.com/repos/' + owner + '/' + repository + '/issues/' + Number(issueNumber) + '/comments', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github+json'
            },
            body: JSON.stringify({
              body: '/close'
            })
          });

          if (!commentResp.ok) {
            console.error('Failed to add /close comment to GitHub issue: ' + commentResp.status);
          }
        } catch (err) {
          console.error('Error closing GitHub issue:', err);
        }
      }

      function createDeleteButton(vmName) {
        const btn = document.createElement('button');
        btn.setAttribute('role', 'button');
        btn.className = 'button-control button-control-delete';
        btn.textContent = 'Delete';
        btn.title = 'Delete this virtual azurion and close associated GitHub issue';

        btn.addEventListener('click', () => {
          showDeleteConfirmModal(vmName);
        });

        return btn;
      }

      function showDeleteConfirmModal(vmName) {
        // Create modal overlay
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        // Create modal
        const modal = document.createElement('div');
        modal.className = 'delete-modal';

        // Title
        const title = document.createElement('h2');
        title.className = 'modal-title';
        title.textContent = 'Confirm Deletion';
        modal.appendChild(title);

        // Message
        const message = document.createElement('p');
        message.className = 'modal-message';
        message.textContent = 'Are you sure you want to delete ' + vmName + '?';
        modal.appendChild(message);

        // Instruction
        const instruction = document.createElement('p');
        instruction.className = 'modal-instruction';
        instruction.textContent = 'Type ' + vmName + ' to confirm:';
        modal.appendChild(instruction);

        // Input field
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'modal-input';
        input.placeholder = 'Enter name';
        input.autocomplete = 'off';
        modal.appendChild(input);

        // Error message
        const errorMsg = document.createElement('p');
        errorMsg.className = 'modal-error';
        errorMsg.textContent = 'VM name does not match';
        errorMsg.style.display = 'none';
        modal.appendChild(errorMsg);

        // Button container
        const buttonContainer = document.createElement('div');
        buttonContainer.className = 'modal-buttons';

        // Cancel button
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'modal-button modal-button-cancel';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.addEventListener('click', () => {
          document.body.removeChild(overlay);
        });
        buttonContainer.appendChild(cancelBtn);

        // Confirm button
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'modal-button modal-button-confirm';
        confirmBtn.textContent = 'Confirm';
        confirmBtn.disabled = true;
        confirmBtn.addEventListener('click', () => {
          if (input.value === vmName) {
            overlay.style.pointerEvents = 'none';
            confirmBtn.disabled = true;
            cancelBtn.disabled = true;
            deleteVm(vmName).then((success) => {
              if (success) {
                loadVms();
              }
              document.body.removeChild(overlay);
            });
          } else {
            input.classList.add('modal-input-error');
            errorMsg.style.display = 'block';
          }
        });
        buttonContainer.appendChild(confirmBtn);

        modal.appendChild(buttonContainer);

        // Validate input on every change
        input.addEventListener('input', () => {
          if (input.value === vmName) {
            input.classList.remove('modal-input-error');
            errorMsg.style.display = 'none';
            confirmBtn.disabled = false;
          } else {
            confirmBtn.disabled = true;
            input.classList.remove('modal-input-error');
            errorMsg.style.display = 'none';
          }
        });

        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        input.focus();
      }

      function createRestartButton(vmName, phase, readyStatus, fetchError) {
        const btn = document.createElement('button');
        btn.setAttribute('role', 'button');
        btn.className = 'button-control button-control-restart';

        const controlState = getControlState(phase, readyStatus, fetchError);
        const isBlocked = controlState.isBlocked || controlState.action === 'start';

        btn.textContent = isBlocked ? 'Restart (Blocked)' : 'Restart';
        btn.disabled = isBlocked;
        if (isBlocked) {
          btn.title = 'Restart blocked until VM state is stable and VM info is available';
        }

        btn.addEventListener('click', () => {
          btn.disabled = true;
          trackVmAction(vmName);
          sendStartStop(vmName, 'restart');
        });

        return btn;
      }


      function renderControlGroup(controlGroup, vmName, phase, readyStatus, fetchError) {
        controlGroup.replaceChildren(
          createControlButton(vmName, phase, readyStatus, fetchError),
          createRestartButton(vmName, phase, readyStatus, fetchError)
        );
      }

      function createVncButton(vmiName, disabled) {
        const btn = document.createElement('button');
        btn.setAttribute('role', 'button');
        btn.className = 'button-17';
        btn.textContent = 'Connect';
        btn.disabled = disabled;

        const vncPath = apiPrefix + '/subresources.kubevirt.io/v1alpha3/namespaces/' +
          namespace + '/virtualmachineinstances/' + encodeURIComponent(vmiName) + '/vnc';
        const vncUrl = 'vnc.html?path=' + encodeURIComponent(vncPath) + '&autoconnect=1&reconnect=1&reconnect_delay=5000';

        btn.addEventListener('click', () => {
          window.open(
            vncUrl,
            'novnc_window',
            'resizable=yes,toolbar=no,location=no,status=no,scrollbars=no,menubar=no,width=1300,height=850'
          );
        });

        return btn;
      }

      function updateVmRowState(vmName, vmi, fetchError) {
        const rowState = vmRowStateMap.get(vmName);
        if (!rowState) {
          return;
        }

        const nextState = buildVmDisplayState(vmi, fetchError);
        const prevState = rowState.currentState;
        const pendingMeta = pendingActionMeta.get(vmName);

        if (pendingMeta) {
          const nextSignature = stateSignature(nextState);
          if (pendingMeta.baselineSignature === null || nextSignature !== pendingMeta.baselineSignature) {
            pendingMeta.sawChange = true;
            pendingActionMeta.set(vmName, pendingMeta);
          }
        }

        if (pendingActionVmNames.has(vmName) && !nextState.controlState.isBlocked && (!pendingMeta || pendingMeta.sawChange)) {
          pendingActionVmNames.delete(vmName);
          pendingActionMeta.delete(vmName);
        }

        const changed =
          !prevState ||
          prevState.phase !== nextState.phase ||
          prevState.readyStatus !== nextState.readyStatus ||
          prevState.fetchError !== nextState.fetchError;

        if (changed) {
          rowState.phasePill.className = 'status-pill status-' + nextState.phase.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          rowState.phasePill.textContent = nextState.phase;
          rowState.readyTd.textContent = nextState.readyStatus;
          rowState.vncButton.disabled = shouldDisableVncButton(vmName, nextState.phase, nextState.controlState);
          rowState.currentState = nextState;
        }

        rowState.vncButton.disabled = shouldDisableVncButton(vmName, nextState.phase, nextState.controlState);
        renderControlGroup(rowState.controlGroup, vmName, nextState.phase, nextState.readyStatus, nextState.fetchError);
        rowState.currentState = nextState;
      }

      async function appendVmRow(vm, vmi, fetchError) {
        const tr = document.createElement('tr');
        const state = buildVmDisplayState(vmi, fetchError);

        const nameTd = document.createElement('td');
        nameTd.className = 'vm-name-cell';
        nameTd.textContent = vm.metadata?.name || 'Unknown';
        tr.appendChild(nameTd);

        const phaseTd = document.createElement('td');
        const phasePill = document.createElement('span');
        phasePill.className = 'status-pill status-' + state.phase.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        phasePill.textContent = state.phase;
        phaseTd.appendChild(phasePill);
        tr.appendChild(phaseTd);

        const readyTd = document.createElement('td');
        readyTd.textContent = state.readyStatus;
        tr.appendChild(readyTd);

        const ageTd = document.createElement('td');
        ageTd.textContent = calculateAge(vm.metadata.creationTimestamp);
        tr.appendChild(ageTd);

        const vmTd = document.createElement('td');
        vmTd.className = 'console-cell';
        const vncButton = createVncButton(vm.metadata.name, shouldDisableVncButton(vm.metadata.name, state.phase, state.controlState));
        vmTd.appendChild(vncButton);
        tr.appendChild(vmTd);

        const controlTd = document.createElement('td');
        controlTd.className = 'controls-cell';
        const controlGroup = document.createElement('div');
        controlGroup.className = 'control-group';
        renderControlGroup(controlGroup, vm.metadata.name, state.phase, state.readyStatus, state.fetchError);
        controlTd.appendChild(controlGroup);
        tr.appendChild(controlTd);

        const deleteTd = document.createElement('td');
        deleteTd.className = 'delete-cell';
        const vmNameStr = vm.metadata?.name || '';
        if (vmNameStr.match(/^va-issue\d+$/)) {
          const deleteButton = createDeleteButton(vmNameStr);
          deleteTd.appendChild(deleteButton);
        }
        tr.appendChild(deleteTd);

        document.getElementById('vmis').appendChild(tr);
        vmRowStateMap.set(vm.metadata.name, {
          phasePill: phasePill,
          readyTd: readyTd,
          vncButton: vncButton,
          controlGroup: controlGroup,
          currentState: state
        });

        const pendingMeta = pendingActionMeta.get(vm.metadata.name);
        if (pendingActionVmNames.has(vm.metadata.name) && !state.controlState.isBlocked && (!pendingMeta || pendingMeta.sawChange)) {
          pendingActionVmNames.delete(vm.metadata.name);
          pendingActionMeta.delete(vm.metadata.name);
        }
      }

      function canListVms(rule) {
        const groups = Array.isArray(rule.apiGroups) ? rule.apiGroups : [];
        const resources = Array.isArray(rule.resources) ? rule.resources : [];
        const verbs = Array.isArray(rule.verbs) ? rule.verbs : [];

        const groupMatch = groups.includes('*') || groups.includes('kubevirt.io');
        const resourceMatch = resources.includes('*') || resources.includes('virtualmachines');
        const verbMatch = verbs.includes('*') || verbs.includes('list');

        return groupMatch && resourceMatch && verbMatch;
      }

      async function discoverAuthorizedNames() {
        const url = '/' + apiPrefix + '/authorization.k8s.io/v1/selfsubjectrulesreviews';
        const body = {
          apiVersion: 'authorization.k8s.io/v1',
          kind: 'SelfSubjectRulesReview',
          spec: { namespace: namespace }
        };

        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!resp.ok) {
          throw new Error('Failed to load permissions: ' + resp.status);
        }

        const review = await resp.json();
        const rules = Array.isArray(review.status?.resourceRules) ? review.status.resourceRules : [];
        const matchedRules = rules.filter(canListVms);

        const names = new Set();
        let allNamesAllowed = false;

        matchedRules.forEach((rule) => {
          const resourceNames = Array.isArray(rule.resourceNames) ? rule.resourceNames : [];
          if (resourceNames.length === 0) {
            allNamesAllowed = true;
            return;
          }

          resourceNames.forEach((name) => {
            if (name) {
              names.add(name);
            }
          });
        });

        return {
          allNamesAllowed: allNamesAllowed,
          names: Array.from(names)
        };
      }

      async function listAllVms() {
        const url = '/' + apiPrefix + '/kubevirt.io/v1/namespaces/' + namespace + '/virtualmachines';
        const resp = await fetch(url);
        if (!resp.ok) {
          throw new Error('Failed to list VMs: ' + resp.status);
        }

        const data = await resp.json();
        return Array.isArray(data.items) ? data.items : [];
      }

      async function listVmByName(name) {
        const selector = encodeURIComponent('metadata.name=' + name);
        const url = '/' + apiPrefix + '/kubevirt.io/v1/namespaces/' + namespace +
          '/virtualmachines?fieldSelector=' + selector;

        const resp = await fetch(url);
        if (!resp.ok) {
          return null;
        }

        const data = await resp.json();
        const items = Array.isArray(data.items) ? data.items : [];
        return items.find((item) => item.metadata?.name === name) || null;
      }

      async function getVmiForVm(vmName) {
        const url = '/' + apiPrefix + '/kubevirt.io/v1alpha3/namespaces/' + namespace +
          '/virtualmachineinstances/' + encodeURIComponent(vmName);

        try {
          const resp = await fetch(url);
          if (resp.status === 404) {
            return { vmi: null, fetchError: false };
          }
          if (!resp.ok) {
            return { vmi: null, fetchError: true };
          }
          return { vmi: await resp.json(), fetchError: false };
        } catch (err) {
          return { vmi: null, fetchError: true };
        }
      }

      async function refreshPendingVmStates() {
        if (refreshInProgress) {
          refreshQueued = true;
          return;
        }

        if (pendingActionVmNames.size === 0) {
          stopActionRefreshLoop();
          return;
        }

        refreshInProgress = true;
        try {
          const vmNames = Array.from(pendingActionVmNames);
          const results = await Promise.all(
            vmNames.map(async (vmName) => {
              const vmiResult = await getVmiForVm(vmName);
              return { vmName: vmName, vmiResult: vmiResult };
            })
          );

          results.forEach((entry) => {
            updateVmRowState(entry.vmName, entry.vmiResult.vmi, entry.vmiResult.fetchError);
          });
        } finally {
          refreshInProgress = false;
          if (pendingActionVmNames.size === 0) {
            stopActionRefreshLoop();
          }
          if (refreshQueued) {
            refreshQueued = false;
            refreshPendingVmStates();
          }
        }
      }

      async function loadVms() {
        if (loadInProgress) {
          loadQueued = true;
          return;
        }

        loadInProgress = true;
        clearRows();
        const username = await getCurrentUsername();

        try {
          let discovered;
          try {
            discovered = await discoverAuthorizedNames();
          } catch (err) {
            console.error(err);
            addMessageRow('Error: unable to load virtual azurions');
            return;
          }

          let vms = [];

          if (discovered.allNamesAllowed) {
            try {
              vms = await listAllVms();
            } catch (err) {
              console.error(err);
              addMessageRow('Error: unable to load virtual azurions');
              return;
            }
          } else if (discovered.names.length > 0) {
            const perNameResults = await Promise.all(discovered.names.map((name) => listVmByName(name)));
            vms = perNameResults.filter((item) => item !== null);
          }

          if (vms.length === 0) {
            addMessageRow('No virtual azurions found for user ' + username);
            return;
          }

          vms.sort((a, b) => String(a.metadata?.name || '').localeCompare(String(b.metadata?.name || '')));
          for (const vm of vms) {
            const vmiResult = await getVmiForVm(vm.metadata.name);
            await appendVmRow(vm, vmiResult.vmi, vmiResult.fetchError);
          }

          const listedVmNames = new Set(vms.map((vm) => vm.metadata?.name).filter(Boolean));
          pendingActionVmNames.forEach((name) => {
            if (!listedVmNames.has(name)) {
              pendingActionVmNames.delete(name);
              pendingActionMeta.delete(name);
            }
          });
        } finally {
          loadInProgress = false;
          if (pendingActionVmNames.size === 0) {
            stopActionRefreshLoop();
          }
          if (loadQueued) {
            loadQueued = false;
            loadVms();
          }
        }
      }

      loadVms();
      startVmListRefreshLoop();

      document.getElementById('btn-refresh-vms').addEventListener('click', function () {
        const btn = this;
        btn.disabled = true;
        loadVms().finally(function () {
          btn.disabled = false;
        });
      });
    </script>
  </meta>
  <body>
    <main class="page-shell">
      <header class="top-bar">
        <div class="title-wrap">
          <h1>Virtual Azurion</h1>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Philips_logo.svg/960px-Philips_logo.svg.png" alt="Philips logo" class="philips-logo" />
      </header>

      <section class="table-card" aria-label="Virtual machine console listing">
        <table>
          <thead>
            <tr><th>Name</th><th>Status</th><th>Ready</th><th>Age</th><th>Console</th><th class="controls-header">Controls</th><th class="delete-header">Delete</th></tr>
          </thead>
          <tbody id="vmis"></tbody>
        </table>
      </section>

      <div class="bottom-bar">
        <section class="info-note" aria-label="Console availability note">
          <span class="warn-triangle" aria-hidden="true"><span>!</span></span>
          <span class="info-note-text">The Virtual Azurion needs some time to boot up (~60s). When connecting, you might not see anything during that time.</span>
        </section>
        <section class="refresh-card" aria-label="Refresh VM list">
          <button id="btn-refresh-vms" class="button-refresh-vms" title="Refresh VM list">&#8635; Refresh</button>
        </section>
      </div>
    </main>
  </body>
</html>
